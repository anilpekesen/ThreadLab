query RunInput {
  cart {
    lines {
      id
      designRole: attribute(key: "_design_role") { value }
      baseUnit: attribute(key: "_base_unit_price") { value }
      surchargeUnit: attribute(key: "_surcharge_unit_total") { value }
      surchargeGid: attribute(key: "_surcharge_variant_gid") { value }
      designToken: attribute(key: "_design_token") { value }
      designDetailUrl: attribute(key: "_design_detail_url") { value }
      locale: attribute(key: "_pl_locale") { value }
      size: attribute(key: "_pl_size") { value }
      frontDesign: attribute(key: "_pl_front_design") { value }
      backDesign: attribute(key: "_pl_back_design") { value }
      totalQuantity: attribute(key: "_pl_total_quantity") { value }
      productUnitPrice: attribute(key: "_pl_product_unit_price") { value }
      productSubtotal: attribute(key: "_pl_product_subtotal") { value }
      totalPrice: attribute(key: "_pl_total_price") { value }
      frontSize: attribute(key: "_pl_front_size") { value }
      frontPrintPrice: attribute(key: "_pl_front_print_price") { value }
      frontPriceBand: attribute(key: "_pl_front_price_band") { value }
      backSize: attribute(key: "_pl_back_size") { value }
      backPrintPrice: attribute(key: "_pl_back_print_price") { value }
      backPriceBand: attribute(key: "_pl_back_price_band") { value }
      bulkDiscount: attribute(key: "_pl_bulk_discount") { value }
      printDiscount: attribute(key: "_pl_print_discount") { value }
      merchandise {
        ... on ProductVariant { id }
      }
    }
  }
}
