query RunInput {
  cart {
    lines {
      id
      quantity
      cost {
        totalAmount { amount currencyCode }
      }
      surchargeVariantGid: attribute(key: "_surcharge_variant_gid") {
        value
      }
      surchargeQtyFront: attribute(key: "_surcharge_qty_front") {
        value
      }
      surchargeQtyBack: attribute(key: "_surcharge_qty_back") {
        value
      }
      merchandise {
        ... on ProductVariant {
          id
        }
      }
    }
  }
}
