# /etc/nginx/sites-available/printlabapp.com
# Kopyalama: sudo cp nginx-printlabapp.conf /etc/nginx/sites-available/printlabapp.com
# Aktif etme: sudo ln -s /etc/nginx/sites-available/printlabapp.com /etc/nginx/sites-enabled/
# SSL:        sudo certbot --nginx -d printlabapp.com -d www.printlabapp.com
# Reload:     sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name printlabapp.com www.printlabapp.com;

    # Certbot bu bloğu SSL için günceller
    location / {
        return 301 https://printlabapp.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.printlabapp.com;

    # SSL sertifikası certbot tarafından eklenir
    # ssl_certificate     /etc/letsencrypt/live/printlabapp.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/printlabapp.com/privkey.pem;

    return 301 https://printlabapp.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name printlabapp.com;

    # SSL sertifikası certbot tarafından eklenir
    # ssl_certificate     /etc/letsencrypt/live/printlabapp.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/printlabapp.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    gzip on;
    gzip_types text/html text/css application/javascript;

    # Aynı Node.js uygulamasına yönlendir (/home, /privacy-policy, /terms-of-service)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # / isteği /home route'una
        if ($request_uri = '/') {
            proxy_pass http://127.0.0.1:3000/home;
        }
    }
}
