name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 144.91.77.39
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: /var/www/printlabapp/shopify-app/deploy.sh
