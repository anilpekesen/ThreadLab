name = "PrintLab"
client_id = "1876054aac4bd32ba8019c2d27ef65f2"
application_url = "https://app.printlabapp.com"
embedded = false

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2026-07"

[webhooks.privacy_compliance]
customers_data_request_url = "/webhooks"
customers_redact_url = "/webhooks"
shop_redact_url = "/webhooks"

[[webhooks.subscriptions]]
topics = ["orders/create"]
uri = "/webhooks"

[[webhooks.subscriptions]]
topics = ["orders/paid"]
uri = "/webhooks"

[[webhooks.subscriptions]]
topics = ["orders/fulfilled"]
uri = "/webhooks"

[[webhooks.subscriptions]]
topics = ["orders/cancelled"]
uri = "/webhooks"

[[webhooks.subscriptions]]
topics = ["orders/delete"]
uri = "/webhooks"


[access_scopes]
scopes = "read_products,write_products,read_orders,write_orders,write_fulfillments,read_merchant_managed_fulfillment_orders,write_merchant_managed_fulfillment_orders,write_app_proxy,write_cart_transforms,write_script_tags"

[auth]
redirect_urls = [
  "https://app.printlabapp.com/auth/callback",
  "https://app.printlabapp.com/auth/callback/offline"
]

[app_proxy]
url = "https://app.printlabapp.com/proxy"
prefix = "apps"
subpath = "tshirt-designer"
